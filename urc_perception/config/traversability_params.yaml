grid_map_visualization:
  ros__parameters:
    grid_map_topic: /costmap
    grid_map_visualizations: [slope, traversability, traversability_inflated]

    slope:
      type: occupancy_grid
      params:
        layer: slope
        data_min: 0.0
        data_max: 1.57

    traversability:
      type: occupancy_grid
      params:
        layer: traversability
        data_min: 0.0
        data_max: 1.0
      publish_rate: 50

    traversability_inflated:
      type: occupancy_grid
      params:
        layer: traversability_inflated
        data_min: 0.0
        data_max: 1.0

traversability_mapping:
  ros__parameters:
    map_frame: map
    odometry_topic: /odometry/filtered_global
    pointcloud_topic: /scan/points
    output_map_topic: /costmap
    cache_map_topic: /cache_map
    filter_chain_parameter_name: filters
    filter_radius: 5.0
    cache_size_x: 10.0
    cache_size_y: 10.0
    resolution: 0.25
    recenter_rate_hz: 20.0

    filters:
      filter1:
        name: buffer_normalizer
        type: gridMapFilters/BufferNormalizerFilter

      filter2: # Reduce noise with a radial blurring filter.
        name: mean_in_radius
        type: gridMapFilters/MeanInRadiusFilter
        params:
          input_layer: elevation
          output_layer: elevation_smooth
          radius: 0.5

      filter3: # Compute surface normals.
        name: surface_normals
        type: gridMapFilters/NormalVectorsFilter
        params:
          input_layer: elevation
          output_layers_prefix: normal_vectors_
          radius: 0.5
          normal_vector_positive_axis: z

      filter4: # Compute slope from surface normal.
        name: slope
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: slope
          expression: acos(normal_vectors_z)

      filter5: # Compute roughness as absolute difference from map to smoothened map.
        name: roughness
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: roughness
          expression: abs(elevation - elevation_smooth)

      filter6: # Compute traversability as normalized weighted sum of slope and roughness.
        name: traversability
        type: gridMapFilters/MathExpressionFilter
        params:
          output_layer: traversability
          expression: slope + roughness

      filter7: # Apply a gaussian kernel with a given radius and coefficient.
        name: gaussian_kernel
        type: urcPerception/GaussianFilter
        params:
          input_layer: traversability
          output_layer: traversability_inflated
          radius: 0.5
          gaussian_coeff: 4.0

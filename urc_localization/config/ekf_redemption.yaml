ekf_filter_node:
  ros__parameters:
    # Timing
    frequency: 30.0
    sensor_timeout: 5.0
    two_d_mode: false
    use_sim_time: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # TF
    publish_tf: true

    # IMU input
    imu0: /imu/fused
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    print_diagnostics: true
    # State order (15):
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Enable yaw (orientation), yaw rate, and linear accel X/Y only
    imu0_config: [
        false, # x
        false, # y
        false, # z
        true, # roll
        true, # pitch
        true, # yaw
        false, # vx
        false, # vy
        false, # vz
        true, # vroll
        true, # vpitch
        true, # vyaw
        false, # ax
        false, # ay
        false, # az
      ]
    odom0: /odom
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # [x y z roll pitch yaw vx vy vz vroll vpitch vyaw ax ay az]
    odom0_config:
      [
        true,
        true,
        true,
        false,
        false,
        false,
        true,
        true,
        false,
        false,
        false,
        true,
        false,
        false,
        false,
      ]

navsat_transform:
  ros__parameters:
    frequency: 30.0
    use_sim_time: true
    delay: 2.0
    magnetic_declination_radians: 0.06736971
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_cartesian_transform: false
    publish_filtered_gps: true
    use_odometry_yaw: false
    wait_for_datum: false

/global/ekf_filter_node_global:
  ros__parameters:
    # Timing
    frequency: 10.0
    sensor_timeout: 5.0
    two_d_mode: false
    use_sim_time: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # TF
    publish_tf: true

    # GPS absolute position from navsat_transform
    odom0: /odometry/gps
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_config:
      [
        true,
        true,
        true,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
        false,
      ]

    # Local EKF for smooth yaw/velocity
    odom1: /odometry/filtered
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false
    odom1_config: [
        false, #x
        false, #y
        false, #z
        false, #roll
        false, #pitch
        true, #yaw
        true, #vx
        true, #vy
        true, #vz
        false, #vroll
        false, #vpitch
        true, #vyaw
        false, #ax
        false, #ay
        false, #az
      ]
